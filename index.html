<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Community ROI Dashboard — Garima</title>
<meta name="description" content="Community Manager performance dashboard tracking events, ambassadors, pipeline, and community health in real time."/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,500;0,9..144,600;1,9..144,300&family=DM+Mono:wght@400;500&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f7f5f0;--surface:#ffffff;--card:#ffffff;
  --ink:#0e0d0b;--ink2:#3d3b36;--ink3:#8a877f;
  --border:#e4e0d8;--border2:#ccc9c0;
  --green:#1a7f5a;--green-bg:#edf7f2;
  --amber:#b85c00;--amber-bg:#fef3e2;
  --red:#b83232;--red-bg:#fdeaea;
  --blue:#1a4f9f;--blue-bg:#eaf0fc;
  --accent:#2d5be3;--accent-light:#eef2fd;
  --mono:'DM Mono',monospace;--serif:'Fraunces',serif;--sans:'Instrument Sans',sans-serif;
  --r:10px;--r-sm:6px;
}
html,body{min-height:100vh;background:var(--bg);color:var(--ink);font-family:var(--sans);font-size:15px}

/* layout */
.shell{display:grid;grid-template-columns:220px 1fr;min-height:100vh}
.sidebar{background:var(--ink);color:#f0ede8;position:sticky;top:0;height:100vh;overflow-y:auto;padding:0;display:flex;flex-direction:column}
.main{overflow:hidden;display:flex;flex-direction:column}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:.85rem 1.75rem;display:flex;align-items:center;justify-content:space-between;gap:1rem;position:sticky;top:0;z-index:10}
.content{padding:1.75rem;display:flex;flex-direction:column;gap:1.5rem;flex:1}

/* sidebar */
.sb-brand{padding:1.4rem 1.2rem 1rem;border-bottom:1px solid rgba(255,255,255,.08)}
.sb-brand-name{font-family:var(--serif);font-size:1.1rem;font-weight:500;letter-spacing:-.01em;color:#f0ede8}
.sb-brand-sub{font-family:var(--mono);font-size:10px;color:rgba(240,237,232,.4);letter-spacing:.08em;margin-top:3px}
.sb-section{padding:.5rem 0}
.sb-label{font-family:var(--mono);font-size:9px;letter-spacing:.14em;color:rgba(240,237,232,.3);padding:.6rem 1.2rem .3rem;text-transform:uppercase}
.sb-item{display:flex;align-items:center;gap:.6rem;padding:.55rem 1.2rem;cursor:pointer;transition:background .15s;border-radius:0;font-size:.82rem;color:rgba(240,237,232,.65);font-family:var(--sans)}
.sb-item:hover,.sb-item.active{background:rgba(255,255,255,.07);color:#f0ede8}
.sb-item.active{border-left:2px solid var(--accent);padding-left:calc(1.2rem - 2px)}
.sb-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.sb-footer{margin-top:auto;padding:1rem 1.2rem;border-top:1px solid rgba(255,255,255,.08)}
.sb-built{font-family:var(--mono);font-size:9px;color:rgba(240,237,232,.3);letter-spacing:.06em;line-height:1.6}
.sb-built a{color:rgba(240,237,232,.5);text-decoration:none}

/* topbar */
.tb-title{font-family:var(--serif);font-size:1.15rem;font-weight:500;color:var(--ink)}
.tb-right{display:flex;align-items:center;gap:.75rem}
.live-badge{display:flex;align-items:center;gap:5px;font-family:var(--mono);font-size:10px;color:var(--green);background:var(--green-bg);border-radius:99px;padding:4px 10px;letter-spacing:.06em}
.live-dot{width:6px;height:6px;background:var(--green);border-radius:50%;animation:pulse 1.6s ease infinite}
.tb-time{font-family:var(--mono);font-size:11px;color:var(--ink3)}
.add-btn{background:var(--accent);color:#fff;border:none;border-radius:var(--r-sm);padding:.45rem .9rem;font-family:var(--sans);font-size:.8rem;font-weight:500;cursor:pointer;transition:opacity .2s}
.add-btn:hover{opacity:.85}

/* section headers */
.sec-row{display:flex;align-items:baseline;justify-content:space-between;gap:1rem}
.sec-title{font-family:var(--serif);font-size:1.35rem;font-weight:500;color:var(--ink);letter-spacing:-.02em}
.sec-sub{font-family:var(--mono);font-size:10px;color:var(--ink3);letter-spacing:.06em}

/* KPI strip */
.kpi-strip{display:grid;grid-template-columns:repeat(5,1fr);gap:.9rem}
.kpi{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:1.1rem 1.2rem}
.kpi-label{font-family:var(--mono);font-size:9px;letter-spacing:.12em;color:var(--ink3);text-transform:uppercase;margin-bottom:.5rem}
.kpi-val{font-family:var(--serif);font-size:2rem;font-weight:500;letter-spacing:-.03em;color:var(--ink);line-height:1}
.kpi-delta{font-family:var(--mono);font-size:10px;margin-top:.35rem}
.up{color:var(--green)}.down{color:var(--red)}.flat{color:var(--ink3)}

/* two col */
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:.9rem}
.three-col{display:grid;grid-template-columns:1fr 1fr 1fr;gap:.9rem}

/* card */
.panel{background:var(--card);border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
.panel-head{padding:.85rem 1.2rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.panel-title{font-family:var(--sans);font-size:.82rem;font-weight:600;color:var(--ink2)}
.panel-body{padding:1.1rem 1.2rem}
.panel-badge{font-family:var(--mono);font-size:9px;padding:2px 8px;border-radius:99px;letter-spacing:.06em}
.badge-green{background:var(--green-bg);color:var(--green)}
.badge-amber{background:var(--amber-bg);color:var(--amber)}
.badge-blue{background:var(--blue-bg);color:var(--blue)}
.badge-red{background:var(--red-bg);color:var(--red)}

/* chart canvas */
.chart-wrap{position:relative;width:100%}
.chart-wrap canvas{display:block}

/* event table */
.evt-table{width:100%;border-collapse:collapse;font-size:.8rem}
.evt-table th{font-family:var(--mono);font-size:9px;letter-spacing:.1em;color:var(--ink3);text-align:left;padding:.5rem .75rem;border-bottom:1px solid var(--border);text-transform:uppercase;background:var(--bg)}
.evt-table td{padding:.65rem .75rem;border-bottom:1px solid var(--border);color:var(--ink2);vertical-align:middle}
.evt-table tr:last-child td{border-bottom:none}
.evt-table tr:hover td{background:#faf9f6}
.evt-type{font-family:var(--mono);font-size:9px;padding:2px 7px;border-radius:3px}
.tag-dinner{background:#f0eaff;color:#5b21b6}
.tag-conf{background:#e0f2fe;color:#0369a1}
.tag-activation{background:#fef3e2;color:#b45309}
.tag-online{background:#dcfce7;color:#15803d}
.conv-bar-wrap{width:80px;height:6px;background:var(--border);border-radius:99px;overflow:hidden;display:inline-block;vertical-align:middle;margin-right:5px}
.conv-bar{height:100%;border-radius:99px;background:var(--accent)}
.status-dot{width:7px;height:7px;border-radius:50%;display:inline-block;margin-right:4px;vertical-align:middle}

/* ambassador list */
.amb-list{display:flex;flex-direction:column;gap:.6rem}
.amb-row{display:flex;align-items:center;gap:.75rem;padding:.6rem .85rem;border-radius:var(--r-sm);border:1px solid var(--border);transition:border-color .2s}
.amb-row:hover{border-color:var(--border2)}
.amb-avatar{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:var(--serif);font-size:.85rem;font-weight:500;flex-shrink:0}
.amb-name{font-size:.82rem;font-weight:600;color:var(--ink)}
.amb-role{font-family:var(--mono);font-size:9px;color:var(--ink3);margin-top:1px}
.amb-stat{margin-left:auto;text-align:right}
.amb-reach{font-family:var(--serif);font-size:1rem;font-weight:500;color:var(--ink)}
.amb-label{font-family:var(--mono);font-size:9px;color:var(--ink3)}
.tier-badge{font-family:var(--mono);font-size:8px;padding:2px 6px;border-radius:3px;margin-left:.5rem}
.tier-gold{background:#fef9c3;color:#a16207}
.tier-silver{background:#f1f5f9;color:#475569}
.tier-bronze{background:#fef3e2;color:#92400e}

/* pipeline funnel */
.funnel{display:flex;flex-direction:column;gap:.5rem}
.funnel-row{display:flex;align-items:center;gap:.75rem}
.funnel-label{font-size:.78rem;color:var(--ink2);width:110px;flex-shrink:0}
.funnel-bar-wrap{flex:1;height:22px;background:var(--bg);border-radius:3px;overflow:hidden;position:relative}
.funnel-bar{height:100%;border-radius:3px;display:flex;align-items:center;padding-left:8px;font-family:var(--mono);font-size:10px;color:#fff;transition:width 1.2s cubic-bezier(.4,0,.2,1)}
.funnel-val{font-family:var(--mono);font-size:.78rem;color:var(--ink2);width:60px;text-align:right;flex-shrink:0}

/* health ring grid */
.health-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:.75rem}
.health-item{display:flex;flex-direction:column;align-items:center;gap:.4rem;padding:.85rem .5rem}
.ring-svg{overflow:visible}
.health-label{font-family:var(--mono);font-size:9px;letter-spacing:.08em;color:var(--ink3);text-align:center;text-transform:uppercase}

/* activity feed */
.feed{display:flex;flex-direction:column}
.feed-item{display:flex;gap:.85rem;padding:.7rem 0;border-bottom:1px solid var(--border);animation:slideIn .3s ease both}
.feed-item:last-child{border-bottom:none}
.feed-icon{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0;margin-top:1px}
.feed-body{flex:1}
.feed-text{font-size:.8rem;color:var(--ink2);line-height:1.45}
.feed-text strong{color:var(--ink);font-weight:600}
.feed-time{font-family:var(--mono);font-size:9px;color:var(--ink3);margin-top:2px}

/* upcoming events */
.upcoming-list{display:flex;flex-direction:column;gap:.55rem}
.upcoming-item{display:flex;gap:.85rem;align-items:flex-start;padding:.7rem .85rem;border-radius:var(--r-sm);border:1px solid var(--border)}
.upcoming-date{min-width:42px;text-align:center;background:var(--ink);color:#f0ede8;border-radius:5px;padding:.35rem .4rem}
.upcoming-day{font-family:var(--serif);font-size:1.2rem;font-weight:500;line-height:1}
.upcoming-mon{font-family:var(--mono);font-size:8px;letter-spacing:.1em;opacity:.6}
.upcoming-body{flex:1}
.upcoming-name{font-size:.82rem;font-weight:600;color:var(--ink)}
.upcoming-meta{font-family:var(--mono);font-size:9px;color:var(--ink3);margin-top:2px}
.upcoming-kpi{text-align:right;flex-shrink:0}
.upcoming-target{font-family:var(--serif);font-size:.95rem;font-weight:500;color:var(--ink)}
.upcoming-tlab{font-family:var(--mono);font-size:9px;color:var(--ink3)}

/* modal */
.modal-bg{position:fixed;inset:0;background:rgba(14,13,11,.5);z-index:100;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s}
.modal-bg.open{opacity:1;pointer-events:all}
.modal{background:var(--surface);border-radius:12px;padding:1.75rem;width:420px;max-width:95vw;box-shadow:0 20px 60px rgba(0,0,0,.2);transform:translateY(16px);transition:transform .2s}
.modal-bg.open .modal{transform:translateY(0)}
.modal-title{font-family:var(--serif);font-size:1.2rem;font-weight:500;margin-bottom:1.2rem}
.field{margin-bottom:.9rem}
.field label{display:block;font-family:var(--mono);font-size:10px;letter-spacing:.1em;color:var(--ink3);margin-bottom:.35rem;text-transform:uppercase}
.field input,.field select{width:100%;padding:.55rem .75rem;border:1px solid var(--border2);border-radius:var(--r-sm);font-family:var(--sans);font-size:.88rem;color:var(--ink);background:var(--bg);outline:none;transition:border-color .2s}
.field input:focus,.field select:focus{border-color:var(--accent)}
.modal-actions{display:flex;gap:.6rem;justify-content:flex-end;margin-top:1.2rem}
.btn-cancel{background:transparent;border:1px solid var(--border2);border-radius:var(--r-sm);padding:.5rem 1rem;font-family:var(--sans);font-size:.85rem;color:var(--ink2);cursor:pointer}
.btn-save{background:var(--accent);border:none;border-radius:var(--r-sm);padding:.5rem 1.1rem;font-family:var(--sans);font-size:.85rem;font-weight:500;color:#fff;cursor:pointer}

/* tabs */
.tabs{display:flex;gap:0;border-bottom:1px solid var(--border);margin-bottom:1.1rem}
.tab{padding:.6rem 1rem;font-size:.8rem;color:var(--ink3);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:color .15s,border-color .15s;font-family:var(--sans)}
.tab.active{color:var(--accent);border-bottom-color:var(--accent);font-weight:600}

/* tooltip */
.tooltip-wrap{position:relative;display:inline-block}
.tooltip{position:absolute;bottom:110%;left:50%;transform:translateX(-50%);background:var(--ink);color:#f0ede8;font-family:var(--mono);font-size:10px;padding:4px 10px;border-radius:4px;white-space:nowrap;pointer-events:none;opacity:0;transition:opacity .15s;z-index:20}
.tooltip-wrap:hover .tooltip{opacity:1}

/* animations */
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes slideIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.fade-in{animation:fadeIn .4s ease both}

/* responsive */
@media(max-width:900px){
  .shell{grid-template-columns:1fr}
  .sidebar{display:none}
  .kpi-strip{grid-template-columns:repeat(3,1fr)}
  .two-col,.three-col{grid-template-columns:1fr}
}
@media(max-width:560px){.kpi-strip{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>
<div class="shell">

<!-- SIDEBAR -->

      <div class="tb-time" id="tb-clock"></div>

  <div class="content" id="content-area">

</div>

<!-- MODAL -->
<div class="modal-bg" id="modal">

    <div class="field"><label>Type</label>

        <option value="activation">Brand Activation</option>
        <option value="online">Online Event</option>

    </div>
    <div class="field"><label>Attendees</label><input type="number" id="m-att" placeholder="e.g. 40"/></div>
    <div class="field"><label>Location</label><input type="text" id="m-loc" placeholder="e.g. Berlin, DE"/></div>
    <div class="field"><label>Budget (€)</label><input type="number" id="m-budget" placeholder="e.g. 3500"/></div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-save" onclick="saveEvent()">Save Event</button>
    </div>
  </div>
</div>

<script>

/* ═══════════════════════════════════════════
   CLOCK
═══════════════════════════════════════════ */
function updateClock(){
  const d=new Date()
  document.getElementById('tb-clock').textContent =
    d.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit',second:'2-digit'}) + ' CET'
}
setInterval(updateClock,1000); updateClock()

/* ═══════════════════════════════════════════
   VIEWS
═══════════════════════════════════════════ */
let currentView = 'overview'
let charts = {}

function setView(view, el) {
  currentView = view
  document.querySelectorAll('.sb-item').forEach(i=>i.classList.remove('active'))
  if(el) el.classList.add('active')
  const titles = {overview:'Overview',events:'Events',ambassadors:'Ambassadors',pipeline:'Pipeline',health:'Community Health',activity:'Activity Feed'}
  document.getElementById('page-title').textContent = titles[view]
  destroyCharts()
  renderView(view)
}

function destroyCharts(){
  Object.values(charts).forEach(c=>{try{c.destroy()}catch(e){}})
  charts={}
}

function renderView(v){
  const el = document.getElementById('content-area')
  el.className = 'content fade-in'
  void el.offsetWidth
  const renders = {overview:renderOverview,events:renderEvents,ambassadors:renderAmbassadors,pipeline:renderPipeline,health:renderHealth,activity:renderActivity}
  el.innerHTML = (renders[v]||renderOverview)()
  initCharts(v)
}

function renderEventRows(){
  const typeMap={dinner:'tag-dinner',conf:'tag-conf',activation:'tag-activation',online:'tag-online'}
  const typeLbl={dinner:'Dinner',conf:'Conference',activation:'Activation',online:'Online'}
  return events.map(e=>{
    const rate = e.attendees>0?Math.round(e.conversions/e.attendees*100):'-'
    const statusColor = e.status==='complete'?'#1a7f5a':'#b85c00'
    return `<tr>
      <td style="font-weight:600;color:var(--ink)">${e.name}</td>
      <td><span class="evt-type ${typeMap[e.type]}">${typeLbl[e.type]}</span></td>
      <td style="font-family:var(--mono);font-size:11px">${e.date}</td>
      <td>${e.location}</td>
      <td style="font-family:var(--mono)">${e.attendees||'—'}</td>
      <td>${e.attendees>0?`<span class="conv-bar-wrap"><span class="conv-bar" style="width:${Math.min(rate,100)}%"></span></span>${rate}%`:'—'}</td>
      <td style="font-family:var(--mono);color:var(--green)">${e.revenue?'€'+fmt(e.revenue):'—'}</td>
      <td style="font-family:var(--mono)">${e.nps||'—'}</td>
      <td><span class="status-dot" style="background:${statusColor}"></span>${e.status}</td>
    </tr>`
  }).join('')
}

function chartOpts(unit,legend){
  return{
    responsive:true,maintainAspectRatio:false,
    plugins:{legend:{display:legend,labels:{font:{size:11,family:'DM Mono'},boxWidth:10,color:'#3d3b36',padding:14}},tooltip:{callbacks:{label:ctx=>`${ctx.dataset.label}: ${unit}${ctx.parsed.y??ctx.parsed}`}}},
    scales:{y:{grid:{color:'rgba(0,0,0,.05)'},ticks:{color:'#8a877f',font:{size:10},callback:v=>`${unit}${v}`},border:{display:false}},x:{grid:{display:false},ticks:{color:'#8a877f',font:{size:10}}}}
  }
}

/* ═══════════════════════════════════════════
   MODAL
═══════════════════════════════════════════ */
function openModal(){document.getElementById('modal').classList.add('open')}
function closeModal(){document.getElementById('modal').classList.remove('open')}
document.getElementById('modal').addEventListener('click',e=>{if(e.target===document.getElementById('modal'))closeModal()})

function saveEvent(){
  const name=document.getElementById('m-name').value.trim()
  if(!name)return
  const type=document.getElementById('m-type').value
  const att=parseInt(document.getElementById('m-att').value)||0
  const loc=document.getElementById('m-loc').value||'TBD'
  const budget=parseInt(document.getElementById('m-budget').value)||0
  const d=new Date(); d.setMonth(d.getMonth()+1)
  const dateStr=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`
  events.push({id:events.length+1,name,type,date:dateStr,location:loc,attendees:att,conversions:0,budget,revenue:0,status:'upcoming',nps:0})
  feedItems.unshift({icon:'📅',bg:'#eef2fd',text:`<strong>${name}</strong> added — ${att} attendees planned in ${loc}`,time:'Just now'})
  closeModal()
  ;['m-name','m-att','m-loc','m-budget'].forEach(id=>document.getElementById(id).value='')
  if(currentView==='events'||currentView==='overview') renderView(currentView)
}

/* ═══════════════════════════════════════════
   LIVE UPDATES
═══════════════════════════════════════════ */
// rotate feed
setInterval(()=>{
  if(currentView==='activity'){
    const fp=document.getElementById('full-feed')
    if(fp) fp.innerHTML=renderFeedItems(feedItems.length)
  }
  if(currentView==='overview'){
    const fp=document.getElementById('feed-panel')
    if(fp) fp.innerHTML=renderFeedItems(4)
  }
},8000)

// update pipeline chart live
setInterval(()=>{
  if(currentView==='overview'&&charts.pipeline){
    const d=charts.pipeline.data.datasets[0].data
    const updated=d.map((v,i)=>i<4?Math.round(v*(1+(Math.random()*.02-.01))):v)
    charts.pipeline.data.datasets[0].data=updated
    charts.pipeline.update('none')
  }
},5000)

/* ═══════════════════════════════════════════
   INIT
═══════════════════════════════════════════ */
renderView('overview')
</script>
